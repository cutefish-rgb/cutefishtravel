<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跟著 Cutefish 去旅行</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero" id="hero">
      <nav class="topbar">
        <div class="brand">重新定義旅行的樂趣</div>
        <div class="top-actions">
          <button class="share-mini" id="shareButton" type="button">分享</button>
          <button class="admin-btn admin-only" id="editHeroButton" type="button">編輯首頁</button>
          <button class="admin-btn" id="adminButton" type="button">管理員登入</button>
        </div>
      </nav>
      <div class="hero-copy">
        <button class="hero-home" id="heroHomeButton" type="button"><span id="heroTitle">跟著 Cutefish 去旅行</span></button>
        <p id="heroQuote">We travel not to escape life, but for life not to escape us.</p>
        <button class="hero-edit admin-only" id="editHeroMainButton" type="button">更改首頁大圖與文字</button>
      </div>
    </header>

    <section class="notice-band" id="noticeBand"></section>

    <main class="layout">
      <aside class="calendar-panel" aria-label="旅遊月曆">
        <div class="panel-heading">
          <button class="icon-btn" id="prevMonth" type="button" aria-label="上一個月">‹</button>
          <h2 id="calendarTitle">月曆</h2>
          <button class="icon-btn" id="nextMonth" type="button" aria-label="下一個月">›</button>
        </div>
        <div class="weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="calendar-legend" aria-label="月曆圖例">
          <span><i class="legend-trip"></i>旅程</span>
          <span><i class="legend-saturday"></i>週六</span>
          <span><i class="legend-sunday"></i>週日</span>
          <span><i class="legend-holiday"></i>國定假日</span>
        </div>
      </aside>

      <section class="content">
        <section class="countdown-band">
          <div>
            <p class="eyebrow">下一次出發</p>
            <h2 id="countdownTitle">載入中</h2>
          </div>
          <div class="countdown" id="countdown"></div>
          <p class="countdown-reminder" id="countdownReminder"></p>
        </section>

        <section class="quick-links">
          <article>
            <h3>飯店推薦</h3>
            <p>價位、舒適度、早餐、地點評分</p>
            <button type="button" data-view="hotels">查看</button>
          </article>
          <article>
            <h3>蔬食餐廳推薦</h3>
            <p>價位、美味、地點、用餐環境評分</p>
            <button type="button" data-view="restaurants">查看</button>
          </article>
          <article>
            <h3>許願清單</h3>
            <p>想去的地點與月份</p>
            <button type="button" data-view="wishlist">查看</button>
          </article>
        </section>

        <section class="section-head" id="tripsSection">
          <div>
            <p class="eyebrow">近日內的旅遊</p>
            <h2>即將發生的行程</h2>
          </div>
          <div class="section-actions">
            <a class="helper-link" href="https://where-am-i-mate.lovable.app/" target="_blank" rel="noreferrer">迷路幫手</a>
            <button class="secondary" id="allTripsButton" type="button">全部旅程</button>
            <button class="primary admin-only" id="newTripButton" type="button">新增旅遊</button>
          </div>
        </section>
        <section class="trip-tools" aria-label="旅程搜尋與篩選">
          <label>搜尋旅程<input id="tripSearch" type="search" placeholder="輸入地點、名稱或備註" /></label>
          <label>狀態篩選<select id="tripStatusFilter">
            <option value="all">全部狀態</option>
            <option value="planning">規劃中</option>
            <option value="open">開放報名</option>
            <option value="confirmed">已成團</option>
            <option value="done">已結束</option>
          </select></label>
        </section>
        <div class="trip-list" id="tripList"></div>
      </section>

    </main>

    <section class="all-trips-view hidden" id="allTripsView">
      <div class="view-header">
        <button class="secondary" id="closeAllTrips" type="button">返回首頁</button>
        <h2>全部旅程</h2>
        <button class="primary admin-only" id="newTripFromAllButton" type="button">新增旅遊</button>
      </div>
      <div class="all-trip-list" id="allTripList"></div>
    </section>

    <section class="recommendation-view hidden" id="recommendationView">
      <div class="view-header">
        <button class="secondary" id="closeRecommendation" type="button">返回首頁</button>
        <h2 id="recommendationTitle"></h2>
        <button class="primary admin-only" id="addRecommendation" type="button">新增項目</button>
      </div>
      <p class="form-note" id="recommendationNote"></p>
      <div class="recommendation-grid" id="recommendationGrid"></div>
    </section>

    <dialog id="loginDialog">
      <form method="dialog" class="dialog-card" id="loginForm">
        <button class="close" type="button" aria-label="關閉">×</button>
        <h2>管理員登入</h2>
        <label>Email<input id="loginEmail" type="email" required /></label>
        <label>密碼<input id="loginPassword" type="password" required /></label>
        <button class="primary" type="submit">登入</button>
        <button class="text-btn" id="setupAdminButton" type="button">設定 / 變更管理員帳號</button>
        <button class="text-btn" id="forgotPasswordButton" type="button">忘記密碼</button>
        <p class="form-note" id="loginNote"></p>
      </form>
    </dialog>

    <dialog id="shareDialog">
      <article class="dialog-card share-dialog">
        <button class="close" type="button" aria-label="關閉">×</button>
        <h2>QR Code 分享</h2>
        <img id="qrCode" alt="分享本頁 QR Code" />
        <button class="primary" type="button" id="copyLinkButton">複製分享連結</button>
        <p class="form-note" id="shareNote"></p>
      </article>
    </dialog>

    <dialog id="adminDialog">
      <form method="dialog" class="dialog-card wide" id="adminForm">
        <button class="close" type="button" aria-label="關閉">×</button>
        <h2 id="adminDialogTitle">管理內容</h2>
        <div id="adminFields"></div>
        <div class="dialog-actions">
          <button class="secondary" value="cancel" type="submit">取消</button>
          <button class="primary" id="saveAdminForm" type="submit">儲存</button>
        </div>
      </form>
    </dialog>

    <dialog id="tripDialog">
      <article class="dialog-card wide trip-detail">
        <button class="close" id="closeTripDialog" type="button">×</button>
        <div id="tripDetail"></div>
      </article>
    </dialog>

    <section class="print-area" id="printArea" aria-hidden="true"></section>

    <nav class="mobile-nav" aria-label="手機快捷列">
      <button type="button" data-mobile-home>首頁</button>
      <button type="button" data-mobile-calendar>月曆</button>
      <button type="button" id="mobileAllTripsButton">全部</button>
      <button type="button" data-view="hotels">推薦</button>
      <button type="button" id="mobileAdminButton">管理</button>
    </nav>

    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
